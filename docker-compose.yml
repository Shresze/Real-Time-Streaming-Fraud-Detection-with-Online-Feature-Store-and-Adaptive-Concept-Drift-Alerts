services:
  # Message Broker (Apache Kafka in KRaft mode)
  kafka:
    image: apache/kafka:latest
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
      - KAFKA_NUM_PARTITIONS=1

  redis:
    image: redis:latest
    ports:
      - "6379:6379"

  postgres:
    image: postgres:latest
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_DB: fraud_detection
    ports:
      - "5432:5432"

  # Flink Cluster
  flink-jobmanager:
    build:
      context: .
      dockerfile: Dockerfile.flink
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager

  flink-taskmanager:
    build:
      context: .
      dockerfile: Dockerfile.flink
    depends_on:
      - flink-jobmanager
    command: taskmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 2

  # Custom Services
  ingestion-service:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    command: python -u ingestion/producer.py
    volumes:
      - ./backend:/app
      - ./creditcard.csv:/app/creditcard.csv
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      - kafka
    restart: on-failure

  inference-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn inference.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8080:8000"
    volumes:
      - ./backend:/app
      - ./creditcard.csv:/app/creditcard.csv
    environment:
      - REDIS_HOST=redis
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/fraud_detection
    depends_on:
      - redis
      - postgres

  frontend-dashboard:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5180:80"
    depends_on:
      - inference-api

  monitoring-prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  monitoring-grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    depends_on:
      - monitoring-prometheus

  # Service to submit the Flink job
  flink-job-submitter:
    build:
      context: .
      dockerfile: Dockerfile.flink
    depends_on:
      - flink-jobmanager
    volumes:
      - ./backend:/app
    command: >
      /opt/flink/bin/flink run 
      -py /app/processing/fraud_processor.py
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager

networks:
  default:
    name: fraud-network
